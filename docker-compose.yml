name: taac2026

x-gpu-build: &gpu-build
  context: .
  dockerfile: Dockerfile
  target: app
  args:
    BASE_IMAGE: ${BASE_IMAGE:-nvidia/cuda:12.8.0-devel-ubuntu24.04}
    PYTHON_VERSION: "3.13"
    UV_EXTRA: cuda128
    ENABLE_TE: ${ENABLE_TE:-0}

x-gpu-env: &gpu-env
  UV_EXTRA: cuda128
  ENABLE_TE: ${ENABLE_TE:-0}
  HF_HOME: /root/.cache/huggingface
  TAAC_OUTPUT_DIR: /workspace/outputs
  EXPECTED_BASE_IMAGE: nvidia/cuda:12.8.0-devel-ubuntu24.04
  EXPECTED_PYTHON_VERSION: "3.13"
  EXPECTED_UV_EXTRA: cuda128

x-gpu-service: &gpu-service
  build: *gpu-build
  ipc: host
  init: true
  gpus: all
  working_dir: /workspace
  environment: *gpu-env
  volumes:
    - hf-cache:/root/.cache/huggingface
    - uv-cache:/root/.cache/uv
    - train-outputs:/workspace/outputs
  tmpfs:
    - /tmp
  restart: "no"

services:
  dev:
    <<: *gpu-service
    profiles: [dev]
    stdin_open: true
    tty: true
    environment:
      <<: *gpu-env
      AUTO_SYNC: ${AUTO_SYNC:-1}
    volumes:
      - .:/workspace
      - hf-cache:/root/.cache/huggingface
      - uv-cache:/root/.cache/uv
      - train-outputs:/workspace/outputs
    command: ["/bin/bash"]

  train:
    <<: *gpu-service
    profiles: [train]
    environment:
      <<: *gpu-env
      TAAC_DATASET_PATH: ${TAAC_DATASET_PATH:-}
      EXPERIMENT: ${EXPERIMENT:-baseline}
      TRAIN_ARGS: ${TRAIN_ARGS:-}
    command:
      - /bin/bash
      - -lc
      - >-
        uv run taac-train --experiment config/$$EXPERIMENT
        $${TAAC_DATASET_PATH:+--dataset-path "$${TAAC_DATASET_PATH}"}
        --run-dir "$${TAAC_OUTPUT_DIR}"
        $${TRAIN_ARGS}

  evaluate:
    <<: *gpu-service
    profiles: [evaluate]
    environment:
      <<: *gpu-env
      TAAC_DATASET_PATH: ${TAAC_DATASET_PATH:-}
      EXPERIMENT: ${EXPERIMENT:-baseline}
      EVAL_ARGS: ${EVAL_ARGS:-}
    command:
      - /bin/bash
      - -lc
      - >-
        uv run taac-evaluate single --experiment config/$$EXPERIMENT
        $${TAAC_DATASET_PATH:+--dataset-path "$${TAAC_DATASET_PATH}"}
        $${EVAL_ARGS}

  search:
    <<: *gpu-service
    profiles: [search]
    environment:
      <<: *gpu-env
      TAAC_DATASET_PATH: ${TAAC_DATASET_PATH:-}
      EXPERIMENT: ${EXPERIMENT:-baseline}
      TRIALS: ${TRIALS:-20}
      SEARCH_ARGS: ${SEARCH_ARGS:-}
    command:
      - /bin/bash
      - -lc
      - >-
        uv run taac-search --experiment config/$$EXPERIMENT
        $${TAAC_DATASET_PATH:+--dataset-path "$${TAAC_DATASET_PATH}"}
        --trials $${TRIALS}
        $${SEARCH_ARGS}

volumes:
  train-outputs:
    name: taac2026-train-outputs
  hf-cache:
    name: taac2026-hf-cache
  uv-cache:
    name: taac2026-uv-cache
