# --------------------------------------------------------------------------
# Theme
# --------------------------------------------------------------------------
[project.theme]
language = "zh"
custom_dir = "docs/overrides"

features = [
    "content.action.edit",
    "content.action.view",
    "content.code.copy",
    "content.code.select",
    "content.tabs.link",
    "content.tooltips",
    "content.footnote.tooltips",
    "navigation.tabs",
    "navigation.tabs.sticky",
    "navigation.sections",
    "navigation.expand",
    "navigation.path",
    "navigation.top",
    "navigation.tracking",
    "navigation.instant",
    "navigation.instant.prefetch",
    "search.highlight",
    "toc.follow",
]

[project.theme.icon]
repo = "fontawesome/brands/github"

[project.theme.font]
text = "IBM Plex Sans"
code = "JetBrains Mono"

[[project.theme.palette]]
scheme = "default"
primary = "blue grey"
accent = "indigo"
toggle.icon = "lucide/moon"
toggle.name = "切换到深色模式"

[[project.theme.palette]]
scheme = "slate"
primary = "blue grey"
accent = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "切换到浅色模式"
